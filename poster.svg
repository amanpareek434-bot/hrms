<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- ============ DEFS ============ -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0a18"/>
      <stop offset="100%" stop-color="#06050f"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="15%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="90%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Icon tile gradients -->
    <linearGradient id="t-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="t-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="t-emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="t-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="t-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="t-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#grid)"/>
  <rect width="1080" height="1350" fill="url(#aurora1)"/>
  <rect width="1080" height="1350" fill="url(#aurora2)"/>
  <rect width="1080" height="1350" fill="url(#aurora3)"/>

  <!-- ============ TOP BAR ============ -->
  <g transform="translate(70, 70)">
    <!-- Logo -->
    <rect x="0" y="0" width="54" height="54" rx="13" fill="url(#brand)" filter="url(#glow)"/>
    <path d="M 27 16 L 27 38 M 16 27 L 38 27" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <text x="68" y="26" fill="white" font-size="22" font-weight="700">PeopleHub</text>
    <text x="68" y="46" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Modern HRMS</text>

    <!-- Status pill -->
    <g transform="translate(630, 9)">
      <rect x="0" y="0" width="310" height="36" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="20" cy="18" r="9" fill="#34d399" fill-opacity="0.25"/>
      <circle cx="20" cy="18" r="5" fill="#34d399"/>
      <text x="36" y="23" fill="white" fill-opacity="0.85" font-size="12.5" font-weight="500">v2 · Open Source · Self-hosted · MySQL</text>
    </g>
  </g>

  <!-- ============ HOOK ============ -->
  <g transform="translate(70, 175)">
    <!-- Eyebrow tag -->
    <g>
      <rect x="0" y="0" width="220" height="34" rx="17" fill="url(#brand)" fill-opacity="0.15" stroke="url(#brand)" stroke-opacity="0.4"/>
      <text x="20" y="22" fill="#f0abfc" font-size="12" font-weight="700" letter-spacing="2">⚡ I BUILT THIS</text>
    </g>

    <!-- Big hook -->
    <text y="100" fill="white" font-size="64" font-weight="800" letter-spacing="-1.8">Stop paying ₹500/seat</text>
    <text y="174" fill="white" font-size="64" font-weight="800" letter-spacing="-1.8">for HR software.</text>
    <text y="258" fill="url(#gradText)" font-size="64" font-weight="800" letter-spacing="-1.8">Self-host this one.</text>

    <text y="312" fill="#ffffff" fill-opacity="0.65" font-size="19" font-weight="400">
      A complete HRMS — 14 modules, dual portals, dark mode, payslip PDFs.
    </text>
    <text y="340" fill="#ffffff" fill-opacity="0.65" font-size="19" font-weight="400">
      Built with Next.js 14, TypeScript &amp; MySQL. 100% open source.
    </text>
  </g>

  <!-- ============ FEATURES GRID ============ -->
  <g transform="translate(70, 580)">
    <text fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="3">✦  WHAT'S INSIDE</text>

    <!-- Row 1 -->
    <!-- Feature 1: Dual portal -->
    <g transform="translate(0, 30)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <!-- icon tile -->
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-violet)"/>
      <g transform="translate(28, 28)" stroke="white" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="14" cy="14" r="5"/>
        <circle cx="28" cy="14" r="5"/>
        <path d="M 4 36 c 0 -6 4 -10 10 -10 s 10 4 10 10"/>
        <path d="M 18 36 c 0 -6 4 -10 10 -10 s 10 4 10 10"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">Dual-Portal Architecture</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Admin + Employee</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">HR admins get full control across all 14</tspan>
        <tspan x="22" dy="20">modules. Employees see only their own data</tspan>
        <tspan x="22" dy="20">— enforced by role-based middleware.</tspan>
      </text>
    </g>

    <!-- Feature 2: Cmd+K -->
    <g transform="translate(470, 30)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-cyan)"/>
      <g transform="translate(28, 28)" stroke="white" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="16" cy="16" r="9"/>
        <path d="M 23 23 L 32 32"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">Cmd + K Global Search</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Notion-grade UX</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">Find any employee, candidate, document</tspan>
        <tspan x="22" dy="20">or department in a single keystroke. Full</tspan>
        <tspan x="22" dy="20">keyboard navigation, grouped results.</tspan>
      </text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 210)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-emerald)"/>
      <g transform="translate(28, 28)" stroke="white" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="8" width="24" height="28" rx="2"/>
        <path d="M 11 16 h 14 M 11 22 h 14 M 11 28 h 10"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">Payslip PDFs</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">One-click download</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">Auto-generated monthly payroll with</tspan>
        <tspan x="22" dy="20">printable A4 payslips — company logo,</tspan>
        <tspan x="22" dy="20">earnings breakdown, net pay. Zero libraries.</tspan>
      </text>
    </g>

    <!-- Feature 4: Recruitment Kanban -->
    <g transform="translate(470, 210)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-pink)"/>
      <g transform="translate(28, 28)" fill="white">
        <rect x="6" y="8" width="8" height="28" rx="1.5"/>
        <rect x="18" y="14" width="8" height="22" rx="1.5" opacity="0.85"/>
        <rect x="30" y="20" width="8" height="16" rx="1.5" opacity="0.7"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">Recruitment Kanban</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Drag &amp; drop pipeline</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">Move candidates Applied → Screening →</tspan>
        <tspan x="22" dy="20">Interview → Offer → Hired. Toggle to table</tspan>
        <tspan x="22" dy="20">view for full pipeline analytics.</tspan>
      </text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 390)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-amber)"/>
      <g transform="translate(28, 28)" stroke="white" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="10" width="28" height="24" rx="2"/>
        <path d="M 6 18 h 28"/>
        <path d="M 12 6 v 8 M 28 6 v 8"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">Smart Leave Engine</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Real-time balances</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">Per-employee balances per leave type —</tspan>
        <tspan x="22" dy="20">Casual, Sick, Earned, Maternity, Paternity.</tspan>
        <tspan x="22" dy="20">Auto-deduct on approval, with progress bars.</tspan>
      </text>
    </g>

    <!-- Feature 6: Self-hosted -->
    <g transform="translate(470, 390)">
      <rect width="450" height="160" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="20" y="20" width="52" height="52" rx="14" fill="url(#t-indigo)"/>
      <g transform="translate(28, 28)" stroke="white" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 20 4 L 4 12 v 10 c 0 8 7 14 16 16 c 9 -2 16 -8 16 -16 V 12 Z"/>
        <path d="M 14 20 l 4 4 l 8 -8"/>
      </g>
      <text x="92" y="42" fill="white" font-size="20" font-weight="700">100% Self-Hosted</text>
      <text x="92" y="65" fill="#ffffff" fill-opacity="0.55" font-size="13" font-weight="500">Your data. Your server.</text>
      <text x="22" y="105" fill="#ffffff" fill-opacity="0.75" font-size="14" font-weight="400">
        <tspan x="22" dy="0">Runs on your own MySQL. JWT in httpOnly</tspan>
        <tspan x="22" dy="20">cookies, bcrypt-hashed passwords. No SaaS</tspan>
        <tspan x="22" dy="20">bills, no per-seat costs, no vendor lock-in.</tspan>
      </text>
    </g>
  </g>

  <!-- ============ MODULES MINI STRIP ============ -->
  <g transform="translate(70, 1175)">
    <text fill="#a78bfa" font-size="12" font-weight="700" letter-spacing="2.5">+ 8 MORE MODULES</text>
    <g font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.85" transform="translate(0, 24)">
      <g transform="translate(0,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Dashboard</text></g>
      <g transform="translate(126,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Attendance</text></g>
      <g transform="translate(252,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Performance</text></g>
      <g transform="translate(378,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Documents</text></g>
      <g transform="translate(504,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Assets</text></g>
      <g transform="translate(630,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Calendar</text></g>
      <g transform="translate(756,0)"><rect width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/><text x="59" y="21" text-anchor="middle">Reports</text></g>
    </g>
  </g>

  <!-- ============ FOOTER ============ -->
  <g transform="translate(70, 1255)">
    <rect width="940" height="68" rx="18" fill="url(#brand)" filter="url(#glow)"/>
    <text x="32" y="32" fill="white" font-size="17" font-weight="700">Next.js 14 · TypeScript · Tailwind CSS · MySQL 8 · JWT + bcrypt</text>
    <text x="32" y="54" fill="white" fill-opacity="0.85" font-size="13" font-weight="500">Setup in 5 minutes · No ORM · Plain SQL · MIT licensed</text>
    <!-- arrow -->
    <circle cx="888" cy="34" r="22" fill="white" fill-opacity="0.2"/>
    <path d="M 878 34 L 898 34 M 891 27 L 898 34 L 891 41" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
