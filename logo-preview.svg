        <circle cx="12" cy="13" r="2" fill="#fff"/>
        <circle cx="20" cy="13" r="2" fill="#fff"/>
        <path d="M9 19 Q16 26 23 19" stroke="#fff" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      </g>
      <g transform="translate(120,-8)">
