    <text x="0" y="-8" fill="#64748b" font-size="11">Favicon comparison @ 16 / 24 / 32 / 48 px</text>

    <!-- Row for A -->
    <g transform="translate(0,4)">
      <text x="-12" y="22" fill="#94a3b8" font-size="11" text-anchor="end">A</text>
      <g transform="translate(0,8)">
        <rect width="16" height="16" rx="3.6" fill="url(#gA)"/>
        <g transform="translate(8,8)" stroke="#fff" stroke-width="0.7" fill="none">
          <polygon points="0,-2.2 1.9,-1.1 1.9,1.1 0,2.2 -1.9,1.1 -1.9,-1.1" fill="#fff" stroke="none"/>
          <polygon points="0,-5.8 1.9,-4.7 1.9,-2.5 0,-1.4 -1.9,-2.5 -1.9,-4.7"/>
          <polygon points="3.8,-2.2 5.7,-1.1 5.7,1.1 3.8,2.2 1.9,1.1 1.9,-1.1"/>
          <polygon points="0,5.8 1.9,4.7 1.9,2.5 0,1.4 -1.9,2.5 -1.9,4.7"/>
          <polygon points="-3.8,-2.2 -1.9,-1.1 -1.9,1.1 -3.8,2.2 -5.7,1.1 -5.7,-1.1"/>
        </g>
      </g>
      <g transform="translate(30,4)">
        <rect width="24" height="24" rx="5.4" fill="url(#gA)"/>
        <g transform="translate(12,12)" stroke="#fff" stroke-width="1" fill="none">
          <polygon points="0,-3.3 2.9,-1.7 2.9,1.7 0,3.3 -2.9,1.7 -2.9,-1.7" fill="#fff" stroke="none"/>
          <polygon points="0,-8.7 2.9,-7 2.9,-3.7 0,-2 -2.9,-3.7 -2.9,-7"/>
          <polygon points="5.7,-3.3 8.6,-1.7 8.6,1.7 5.7,3.3 2.9,1.7 2.9,-1.7"/>
          <polygon points="0,8.7 2.9,7 2.9,3.7 0,2 -2.9,3.7 -2.9,7"/>
          <polygon points="-5.7,-3.3 -2.9,-1.7 -2.9,1.7 -5.7,3.3 -8.6,1.7 -8.6,-1.7"/>
        </g>
      </g>
      <g transform="translate(70,0)">
        <rect width="32" height="32" rx="7.2" fill="url(#gA)"/>
        <g transform="translate(16,16)" stroke="#fff" stroke-width="1.3" fill="none">
          <polygon points="0,-4.4 3.8,-2.2 3.8,2.2 0,4.4 -3.8,2.2 -3.8,-2.2" fill="#fff" stroke="none"/>
          <polygon points="0,-11.6 3.8,-9.4 3.8,-5 0,-2.8 -3.8,-5 -3.8,-9.4"/>
          <polygon points="7.6,-4.4 11.4,-2.2 11.4,2.2 7.6,4.4 3.8,2.2 3.8,-2.2"/>
          <polygon points="0,11.6 3.8,9.4 3.8,5 0,2.8 -3.8,5 -3.8,9.4"/>
          <polygon points="-7.6,-4.4 -3.8,-2.2 -3.8,2.2 -7.6,4.4 -11.4,2.2 -11.4,-2.2"/>
        </g>
      </g>
      <g transform="translate(120,-8)">
        <rect width="48" height="48" rx="10.8" fill="url(#gA)"/>
        <g transform="translate(24,24)" stroke="#fff" stroke-width="1.9" fill="none">
          <polygon points="0,-6.6 5.7,-3.3 5.7,3.3 0,6.6 -5.7,3.3 -5.7,-3.3" fill="#fff" stroke="none"/>
          <polygon points="0,-17.4 5.7,-14.1 5.7,-7.5 0,-4.2 -5.7,-7.5 -5.7,-14.1"/>
          <polygon points="11.4,-6.6 17.1,-3.3 17.1,3.3 11.4,6.6 5.7,3.3 5.7,-3.3"/>
          <polygon points="0,17.4 5.7,14.1 5.7,7.5 0,4.2 -5.7,7.5 -5.7,14.1"/>
          <polygon points="-11.4,-6.6 -5.7,-3.3 -5.7,3.3 -11.4,6.6 -17.1,3.3 -17.1,-3.3"/>
        </g>
      </g>
    </g>

    <!-- Row for B -->
    <g transform="translate(0,46)">
      <text x="-12" y="22" fill="#94a3b8" font-size="11" text-anchor="end">B</text>
      <g transform="translate(0,8)">
        <rect width="16" height="16" rx="3.6" fill="url(#gB)"/>
        <rect x="4" y="3" width="2" height="10" rx="0.6" fill="#fff"/>
        <rect x="10" y="3" width="2" height="10" rx="0.6" fill="#fff"/>
        <rect x="6" y="7" width="4" height="2" rx="0.4" fill="#fff"/>
      </g>
      <g transform="translate(30,4)">
        <rect width="24" height="24" rx="5.4" fill="url(#gB)"/>
        <rect x="6" y="5" width="3" height="14" rx="0.9" fill="#fff"/>
        <rect x="15" y="5" width="3" height="14" rx="0.9" fill="#fff"/>
        <rect x="9" y="11" width="6" height="3" rx="0.6" fill="#fff"/>
      </g>
      <g transform="translate(70,0)">
        <rect width="32" height="32" rx="7.2" fill="url(#gB)"/>
        <rect x="8" y="7" width="4" height="18" rx="1.2" fill="#fff"/>
        <rect x="20" y="7" width="4" height="18" rx="1.2" fill="#fff"/>
        <rect x="12" y="14" width="8" height="4" rx="0.8" fill="#fff"/>
      </g>
      <g transform="translate(120,-8)">
        <rect width="48" height="48" rx="10.8" fill="url(#gB)"/>
        <rect x="11" y="10" width="6" height="28" rx="1.8" fill="#fff"/>
        <rect x="31" y="10" width="6" height="28" rx="1.8" fill="#fff"/>
        <rect x="17" y="22" width="14" height="5" rx="1.2" fill="#fff"/>
      </g>
    </g>

    <!-- Row for C -->
    <g transform="translate(0,88)">
      <text x="-12" y="22" fill="#94a3b8" font-size="11" text-anchor="end">C</text>
      <g transform="translate(0,8)">
        <rect width="16" height="16" rx="3.6" fill="url(#gC)"/>
        <circle cx="6" cy="6.5" r="1.1" fill="#fff"/>
        <circle cx="10.5" cy="6.5" r="1.1" fill="#fff"/>
