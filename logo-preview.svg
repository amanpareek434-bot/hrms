        <circle cx="16" cy="10" r="1.6" fill="#fff"/>
        <path d="M7 14 Q12.5 19 18 14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </g>
      <g transform="translate(70,0)">
