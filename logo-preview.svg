      <text x="-12" y="22" fill="#94a3b8" font-size="11" text-anchor="end">D</text>
      <g transform="translate(0,8)">
        <rect width="16" height="16" rx="3.6" fill="url(#gD)"/>
        <g stroke="#a3e635" stroke-width="0.5" stroke-linecap="round">
          <line x1="8" y1="8" x2="3.5" y2="4"/>
          <line x1="8" y1="8" x2="12.5" y2="4"/>
          <line x1="8" y1="8" x2="4" y2="12.5"/>
          <line x1="8" y1="8" x2="12" y2="12.5"/>
        </g>
        <circle cx="3.5" cy="4" r="1.1" fill="#a3e635"/>
        <circle cx="12.5" cy="4" r="1.1" fill="#a3e635"/>
        <circle cx="4" cy="12.5" r="1.1" fill="#a3e635"/>
        <circle cx="12" cy="12.5" r="1.1" fill="#a3e635"/>
        <circle cx="8" cy="8" r="1.8" fill="#a3e635"/>
      </g>
      <g transform="translate(30,4)">
        <rect width="24" height="24" rx="5.4" fill="url(#gD)"/>
        <g stroke="#a3e635" stroke-width="0.7" stroke-linecap="round">
          <line x1="12" y1="12" x2="5" y2="6"/>
          <line x1="12" y1="12" x2="19" y2="6"/>
          <line x1="12" y1="12" x2="6" y2="19"/>
          <line x1="12" y1="12" x2="18" y2="19"/>
        </g>
        <circle cx="5" cy="6" r="1.4" fill="#a3e635"/>
        <circle cx="19" cy="6" r="1.4" fill="#a3e635"/>
        <circle cx="6" cy="19" r="1.4" fill="#a3e635"/>
        <circle cx="18" cy="19" r="1.4" fill="#a3e635"/>
        <circle cx="12" cy="12" r="2.6" fill="#a3e635"/>
      </g>
      <g transform="translate(70,0)">
        <rect width="32" height="32" rx="7.2" fill="url(#gD)"/>
        <g stroke="#a3e635" stroke-width="0.9" stroke-linecap="round">
          <line x1="16" y1="16" x2="7" y2="8"/>
          <line x1="16" y1="16" x2="25" y2="8"/>
          <line x1="16" y1="16" x2="8" y2="25"/>
          <line x1="16" y1="16" x2="24" y2="25"/>
        </g>
        <circle cx="7" cy="8" r="1.8" fill="#a3e635"/>
        <circle cx="25" cy="8" r="1.8" fill="#a3e635"/>
        <circle cx="8" cy="25" r="1.8" fill="#a3e635"/>
        <circle cx="24" cy="25" r="1.8" fill="#a3e635"/>
        <circle cx="16" cy="16" r="3.6" fill="#a3e635"/>
      </g>
      <g transform="translate(120,-8)">
        <rect width="48" height="48" rx="10.8" fill="url(#gD)"/>
        <g stroke="#a3e635" stroke-width="1.4" stroke-linecap="round">
          <line x1="24" y1="24" x2="10" y2="12"/>
          <line x1="24" y1="24" x2="38" y2="12"/>
          <line x1="24" y1="24" x2="12" y2="38"/>
          <line x1="24" y1="24" x2="36" y2="38"/>
        </g>
        <circle cx="10" cy="12" r="2.8" fill="#a3e635"/>
        <circle cx="38" cy="12" r="2.8" fill="#a3e635"/>
        <circle cx="12" cy="38" r="2.8" fill="#a3e635"/>
        <circle cx="36" cy="38" r="2.8" fill="#a3e635"/>
        <circle cx="24" cy="24" r="5.4" fill="#a3e635"/>
